<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #18181b; }
      .stroke { stroke: #60a5fa; }
      .accent { fill: #60a5fa; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #f4f6f8; }
      .stroke { stroke: #2563eb; }
      .accent { fill: #2563eb; }
    }
  </style>
  <!-- Background circle -->
  <circle class="bg" cx="24" cy="24" r="23"/>
  <!-- Stylized N / Nexus mark - three connected nodes suggesting flow -->
  <path class="stroke" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" d="M14 34 L14 14 L24 26 L34 14 L34 34 M14 24 L34 24"/>
  <!-- Top node accent -->
  <circle class="accent" cx="34" cy="14" r="3"/>
  <!-- Bottom left node accent -->
  <circle class="accent" cx="14" cy="34" r="3"/>
</svg>