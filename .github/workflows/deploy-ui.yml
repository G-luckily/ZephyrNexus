name: Deploy UI to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'ui/**'
  pull_request:
    branches: [main]
    paths:
      - 'ui/**'

concurrency:
  group: deploy-ui-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'ui/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ui

      - name: Build
        run: pnpm run build
        working-directory: ui

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=zephyr-nexus-ui --commit-dirty=true
          workingDirectory: ui

      - name: Upload preview URL
        if: github.event_name == 'pull_request'
        run: echo "preview_url=https://${{ github.sha }}.zephyr-nexus-ui.pages.dev" >> $GITHUB_OUTPUT